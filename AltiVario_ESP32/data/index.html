<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AltiVario Configuration</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>AltiVario</h1>

    <h2>Configuration</h2>
    <div id="config-form">
        <label>Climb Threshold (m/s)</label>
        <input type="number" id="climbThreshold" step="0.1" min="0" max="5">

        <label>Sink Threshold (m/s)</label>
        <input type="number" id="sinkThreshold" step="0.1" min="-10" max="0">

        <label>Audio Mode</label>
        <select id="audioMode">
            <option value="0">Piezo</option>
            <option value="1">DAC Speaker</option>
        </select>

        <label>Volume (0-100)</label>
        <input type="range" id="volume" min="0" max="100">

        <label>QNH (Pa)</label>
        <input type="number" id="qnh" step="1" min="90000" max="110000">

        <div class="toggles">
            <label><input type="checkbox" id="bleEnabled"> BLE Telemetry</label>
            <label><input type="checkbox" id="gpsEnabled"> GPS</label>
            <label><input type="checkbox" id="sdEnabled"> SD Card Logging</label>
        </div>

        <button onclick="saveConfig()">Save Configuration</button>
    </div>

    <h2>Flight Logs</h2>
    <div id="files">Loading...</div>

    <script src="config.js"></script>
</body>
</html>
